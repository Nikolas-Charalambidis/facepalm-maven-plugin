name: Build & Site

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch: # Manual trigger.

jobs:
  ci:
    name: CI / Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build & Verify
        run: mvn -B clean verify

      - name: Upload Report Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            target/pmd.xml
            target/failsafe-reports

  site:
    name: Generate & Upload Site
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' # Master branch only.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build & Generate Site
        run: mvn -B clean verify site

      - name: Upload Site Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: target/site
