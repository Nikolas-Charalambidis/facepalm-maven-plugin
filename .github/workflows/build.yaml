name: Build & Verify

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch: # Allows to trigger a test run manually.

jobs:
  build:
    name: Build & Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      # Run jxr here so the PMD report in the artifacts has working links.
      - name: Build and Test
        run: mvn -B clean jxr:jxr verify

      - name: Upload Analysis Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pmd-reports-${{ github.event.pull_request.number || 'master' }}
          path: target/site
